<!DOCTYPE html>
<html>
<head><title>Teacher Login</title>
<style>
    body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 20px; border: 1px solid #3b82f6; width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
    <div class="card">
        <h2>Teacher Login</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email (akhil@mlrit.ac.in)" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="font-size: 0.8em; margin-top: 20px;">New? <a href="/teacher_signup" style="color: #60a5fa;">Create Account</a></p>
        {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    </div>
</body>
</html>

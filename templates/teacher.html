<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduSense | Faculty Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --bg: #0b0f1a;
            --panel: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            grid-template-rows: 1.4fr 0.6fr;
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
            min-height: 0;
        }

        .analysis-panel {
            grid-row: span 2;
        }

        .panel {
            background: var(--panel);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-header {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            font-size: 0.72rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.3px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .session-stats {
            background: var(--primary);
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .emotion-counters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 10px 10px;
            font-size: 0.75rem;
        }

        .emotion-pill {
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
        }

        .attention-list {
            flex: 1;
            overflow: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .attention-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            background: rgba(239, 68, 68, 0.14);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 6px;
            padding: 7px 9px;
        }

        .control-bar {
            height: 70px;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .student-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
        }

        .grid-slot {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .grid-tag {
            position: absolute;
            left: 8px;
            bottom: 8px;
            background: rgba(0, 0, 0, 0.65);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            z-index: 20;
        }
    </style>
</head>

<body>
    <div class="workspace">
        <div class="panel analysis-panel">
            <div class="panel-header">LIVE ENGAGEMENT & CONFUSION TRACKER</div>
            <div style="flex: 1; padding: 10px;"><canvas id="liveChart"></canvas></div>
            <div class="session-stats"><span>ONLINE: <span id="onlineCount">0</span></span><span id="alertBox">ALERT:
                    NORMAL</span></div>
            <div class="emotion-counters">
                <div class="emotion-pill"><span>Engaged</span><strong id="engagedCount">0</strong></div>
                <div class="emotion-pill"><span>Neutral</span><strong id="neutralCount">0</strong></div>
                <div class="emotion-pill"><span>Confused</span><strong id="confusedCount">0</strong></div>
                <div class="emotion-pill"><span>Distracted</span><strong id="distractedCount">0</strong></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">PROFESSOR (LIVE)</div>
            <video id="tVideo" autoplay muted playsinline></video>
        </div>
        <div class="panel">
            <div class="panel-header">STUDENTS REQUIRING ATTENTION</div>
            <div class="attention-list" id="attentionList"></div>
            <div class="student-grid" id="studentGallery">
                <div class="grid-slot"></div>
                <div class="grid-slot"></div>
                <div class="grid-slot"></div>
                <div class="grid-slot"></div>
            </div>
        </div>
    </div>
    <div class="control-bar">
        <button class="btn-ctrl"><i class="fas fa-microphone"></i></button>
        <button class="btn-ctrl"><i class="fas fa-video"></i></button>
        <button
            style="background:var(--danger); border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer;"
            onclick="location.href='/teacher_console'">End Session</button>
    </div>
    <script>
        const socket = io();
        let myStream;
        const peers = {};

        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''), datasets: [
                    { label: 'Engagement', data: Array(20).fill(0), borderColor: '#3b82f6', tension: 0.4 },
                    { label: 'Confusion', data: Array(20).fill(0), borderColor: '#ef4444', tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        async function init() {
            myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('tVideo').srcObject = myStream;
            socket.emit('join_room', { room: "global_room", role: 'teacher', name: "Teacher" });
        }

        socket.on('new_student', data => {
            const peer = new SimplePeer({ initiator: true, stream: myStream });
            peer.on('signal', signal => socket.emit('signal', { to: data.sid, signal }));
            peer.on('stream', stream => {
                const slot = [...document.querySelectorAll('.grid-slot')].find(s => !s.hasChildNodes());
                if (!slot) return;
                const vid = document.createElement('video');
                vid.srcObject = stream;
                vid.autoplay = true;
                const tag = document.createElement('div');
                tag.className = 'grid-tag';
                tag.innerText = data.name || 'Student';
                slot.appendChild(vid);
                slot.appendChild(tag);
            });
            peers[data.sid] = peer;
        });

        socket.on('student_left', data => {
            if (!peers[data.sid]) return;
            peers[data.sid].destroy();
            delete peers[data.sid];
        });

        socket.on('signal', data => {
            if (peers[data.sid]) peers[data.sid].signal(data.signal);
        });

        socket.on('metrics_received', data => {
            liveChart.data.datasets[0].data.shift();
            liveChart.data.datasets[0].data.push(data.engagement);
            liveChart.data.datasets[1].data.shift();
            liveChart.data.datasets[1].data.push(data.confusion);
            liveChart.update('none');

            const alertBox = document.getElementById('alertBox');
            if (data.confusion > 50) {
                alertBox.innerText = `ALERT: ${data.name} needs help`;
                alertBox.style.color = 'orange';
            }
        });

        socket.on('class_summary', summary => {
            document.getElementById('onlineCount').innerText = summary.online;
            document.getElementById('engagedCount').innerText = summary.emotion_counts.engaged || 0;
            document.getElementById('neutralCount').innerText = summary.emotion_counts.neutral || 0;
            document.getElementById('confusedCount').innerText = summary.emotion_counts.confused || 0;
            document.getElementById('distractedCount').innerText = summary.emotion_counts.distracted || 0;

            const attention = document.getElementById('attentionList');
            attention.innerHTML = '';
            if (!summary.attention_list.length) {
                const row = document.createElement('div');
                row.className = 'attention-item';
                row.innerHTML = '<span>No active alerts</span><span>✅</span>';
                attention.appendChild(row);
            } else {
                summary.attention_list.forEach(student => {
                    const row = document.createElement('div');
                    row.className = 'attention-item';
                    row.innerHTML = `<span>${student.name} · ${student.emotion}</span><strong>${student.confusion}% confusion</strong>`;
                    attention.appendChild(row);
                });
            }

            liveChart.data.datasets[0].data.shift();
            liveChart.data.datasets[0].data.push(summary.engagement);
            liveChart.data.datasets[1].data.shift();
            liveChart.data.datasets[1].data.push(summary.confusion);
            liveChart.update('none');

            const alertBox = document.getElementById('alertBox');
            if (summary.confusion > 50) {
                alertBox.innerText = 'ALERT: Class confusion is high';
                alertBox.style.color = 'orange';
            } else {
                alertBox.innerText = 'ALERT: NORMAL';
                alertBox.style.color = 'white';
            }
        });

        window.onload = init;
    </script>
</body>

</html>

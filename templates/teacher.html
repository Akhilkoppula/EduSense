<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduSense | Faculty Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #0b1220;
            --panel: #111b2e;
            --panel-soft: #17233a;
            --line: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(440px, 1fr) minmax(520px, 1.1fr);
            gap: 14px;
            padding: 14px;
            min-height: 0;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
            min-height: 0;
            overflow: hidden;
        }

        .panel-header {
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            padding: 11px 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(0, 0, 0, 0.25);
        }

        .analysis-panel {
            display: grid;
            grid-template-rows: auto minmax(180px, 1fr) auto auto auto;
            gap: 10px;
            padding: 0 0 12px;
        }

        .chart-wrap {
            padding: 0 12px;
            min-height: 0;
        }

        .session-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            padding: 0 12px;
        }

        .stat-item {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.45);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
            font-weight: 600;
        }

        .teacher-alert {
            margin: 0 12px;
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.45);
            background: rgba(239, 68, 68, 0.16);
            font-size: 0.78rem;
            display: none;
        }

        .emotion-counters {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 0 12px;
        }

        .emotion-pill {
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
        }

        .attention-list {
            margin: 0 12px;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 165px;
            overflow-y: auto;
        }

        .attention-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-radius: 9px;
            border: 1px solid rgba(239, 68, 68, 0.35);
            background: rgba(239, 68, 68, 0.12);
            font-size: 0.76rem;
            padding: 8px 10px;
        }

        .attention-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attention-item button {
            border: 1px solid rgba(59, 130, 246, 0.75);
            background: rgba(59, 130, 246, 0.25);
            color: white;
            border-radius: 7px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.72rem;
        }

        .video-column {
            display: grid;
            grid-template-rows: minmax(200px, 42%) minmax(280px, 58%);
            gap: 14px;
            min-height: 0;
        }

        .teacher-video-card,
        .students-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .teacher-video-wrap {
            flex: 1;
            min-height: 0;
            padding: 10px;
        }

        .teacher-video-wrap video {
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        .gallery-wrap {
            flex: 1;
            min-height: 0;
            padding: 10px;
        }

        .student-grid {
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .grid-slot {
            border: 1px solid var(--line);
            border-radius: 8px;
            min-height: 130px;
            position: relative;
            overflow: hidden;
            background: #05070c;
        }

        .grid-tag {
            position: absolute;
            left: 8px;
            bottom: 8px;
            border-radius: 6px;
            font-size: 0.68rem;
            padding: 3px 7px;
            background: rgba(0, 0, 0, 0.62);
            z-index: 2;
        }

        .control-bar {
            height: 74px;
            border-top: 1px solid var(--line);
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .btn-ctrl {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 1.05rem;
        }

        .btn-ctrl.off {
            background: var(--danger);
        }

        .end-btn {
            border: none;
            border-radius: 9px;
            color: #fff;
            padding: 11px 18px;
            cursor: pointer;
            background: var(--danger);
            font-weight: 700;
        }

        .ok {
            color: #bbf7d0;
        }

        @media (max-width: 1200px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .video-column {
                grid-template-rows: minmax(220px, 1fr) minmax(350px, 1.2fr);
            }

            .analysis-panel {
                grid-template-rows: auto minmax(210px, 1fr) auto auto auto;
            }
        }
    </style>
</head>

<body>
    <div class="workspace">
        <div class="panel analysis-panel">
            <div class="panel-header">LIVE ENGAGEMENT & CONFUSION TRACKER</div>
            <div class="chart-wrap"><canvas id="liveChart"></canvas></div>
            <div class="session-stats">
                <div class="stat-item">ONLINE<br><span id="onlineCount">0</span></div>
                <div class="stat-item">ACTIVE ALERTS<br><span id="activeAlerts">0</span></div>
                <div class="stat-item" id="alertBox">ALERT: NORMAL</div>
            </div>
            <div class="teacher-alert" id="teacherAlert"></div>
            <div class="emotion-counters">
                <div class="emotion-pill"><span>Engaged</span><strong id="engagedCount">0</strong></div>
                <div class="emotion-pill"><span>Neutral</span><strong id="neutralCount">0</strong></div>
                <div class="emotion-pill"><span>Confused</span><strong id="confusedCount">0</strong></div>
                <div class="emotion-pill"><span>Distracted</span><strong id="distractedCount">0</strong></div>
            </div>
            <ul class="attention-list" id="attentionList"></ul>
        </div>

        <div class="video-column">
            <div class="panel teacher-video-card">
                <div class="panel-header">TEACHER LIVE CAMERA</div>
                <div class="teacher-video-wrap"><video id="tVideo" autoplay muted playsinline></video></div>
            </div>
            <div class="panel students-card">
                <div class="panel-header">STUDENT GALLERY (SCROLL FOR MORE)</div>
                <div class="gallery-wrap">
                    <div class="student-grid" id="studentGallery"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <button class="btn-ctrl" id="tMic"><i class="fas fa-microphone"></i></button>
        <button class="btn-ctrl" id="tCam"><i class="fas fa-video"></i></button>
        <button class="end-btn" onclick="location.href='/teacher_console'">End Session</button>
    </div>

    <script>
        const socket = io();
        let myStream;
        const peers = {};
        const slots = {};
        let tMicOn = true;
        let tCamOn = true;

        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(24).fill(''),
                datasets: [
                    { label: 'Engagement', data: Array(24).fill(0), borderColor: '#3b82f6', tension: 0.25 },
                    { label: 'Confusion', data: Array(24).fill(0), borderColor: '#ef4444', tension: 0.25 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } },
                plugins: { legend: { labels: { color: '#dbeafe' } } }
            }
        });

        function addStudentSlot(sid, name) {
            if (slots[sid]) return slots[sid];
            const gallery = document.getElementById('studentGallery');
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.sid = sid;
            const tag = document.createElement('div');
            tag.className = 'grid-tag';
            tag.textContent = name || 'Student';
            slot.appendChild(tag);
            gallery.appendChild(slot);
            slots[sid] = slot;
            return slot;
        }

        function removeStudentSlot(sid) {
            if (!slots[sid]) return;
            slots[sid].remove();
            delete slots[sid];
        }

        function pushChartPoint(engagement, confusion) {
            liveChart.data.datasets[0].data.shift();
            liveChart.data.datasets[0].data.push(engagement);
            liveChart.data.datasets[1].data.shift();
            liveChart.data.datasets[1].data.push(confusion);
            liveChart.update('none');
        }

        function showTeacherAlert(message, isOk = false) {
            const alertPanel = document.getElementById('teacherAlert');
            alertPanel.textContent = message;
            alertPanel.style.display = 'block';
            alertPanel.classList.toggle('ok', isOk);
            setTimeout(() => {
                alertPanel.style.display = 'none';
                alertPanel.classList.remove('ok');
            }, 5500);
        }

        function ensureTeacherPeer(student) {
            if (peers[student.sid]) {
                peers[student.sid].destroy();
                delete peers[student.sid];
            }

            addStudentSlot(student.sid, student.name);
            const config = { initiator: true, trickle: false };
            if (myStream) config.stream = myStream;
            const peer = new SimplePeer(config);

            peer.on('signal', signal => socket.emit('signal', { to: student.sid, signal }));
            peer.on('stream', stream => {
                const slot = addStudentSlot(student.sid, student.name);
                let vid = slot.querySelector('video');
                if (!vid) {
                    vid = document.createElement('video');
                    vid.autoplay = true;
                    vid.playsInline = true;
                    slot.prepend(vid);
                }
                vid.srcObject = stream;
            });

            peer.on('error', () => {
                showTeacherAlert(`Reconnecting ${student.name || 'student'} media...`);
            });

            peers[student.sid] = peer;
        }

        function contactStudent(sid, name) {
            socket.emit('contact_student', {
                target_sid: sid,
                teacher: 'Teacher',
                message: `Hi ${name}, I noticed you are confused. I can help now.`
            });
            showTeacherAlert(`Support message sent to ${name}.`, true);
        }

        async function init() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('tVideo').srcObject = myStream;
            } catch (error) {
                showTeacherAlert('Camera/microphone blocked. Analytics still work, but media preview is unavailable.');
            }

            socket.emit('join_room', { room: 'global_room', role: 'teacher', name: 'Teacher' });
        }

        socket.on('new_student', student => ensureTeacherPeer(student));

        socket.on('student_left', data => {
            if (peers[data.sid]) {
                peers[data.sid].destroy();
                delete peers[data.sid];
            }
            removeStudentSlot(data.sid);
        });

        socket.on('signal', data => {
            if (peers[data.sid]) {
                peers[data.sid].signal(data.signal);
            }
        });

        socket.on('confusion_alert', data => {
            showTeacherAlert(`🚨 ${data.message}`);
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = `ALERT: ${data.name} confused > 1 min`;
            alertBox.style.borderColor = 'rgba(245, 158, 11, 0.8)';
            alertBox.style.background = 'rgba(245, 158, 11, 0.2)';
        });

        socket.on('class_summary', summary => {
            document.getElementById('onlineCount').textContent = summary.online;
            document.getElementById('activeAlerts').textContent = summary.active_alerts || 0;
            document.getElementById('engagedCount').textContent = summary.emotion_counts.engaged || 0;
            document.getElementById('neutralCount').textContent = summary.emotion_counts.neutral || 0;
            document.getElementById('confusedCount').textContent = summary.emotion_counts.confused || 0;
            document.getElementById('distractedCount').textContent = summary.emotion_counts.distracted || 0;

            const attention = document.getElementById('attentionList');
            attention.innerHTML = '';

            if (!summary.attention_list.length) {
                const row = document.createElement('li');
                row.className = 'attention-item';
                row.innerHTML = '<span>No active alerts</span><strong>✅</strong>';
                attention.appendChild(row);
            } else {
                summary.attention_list.forEach(student => {
                    const row = document.createElement('li');
                    row.className = 'attention-item';

                    const duration = student.confused_for_seconds ? ` · ${student.confused_for_seconds}s` : '';
                    const severity = student.sustained_confusion ? ' 🚨' : '';

                    const info = document.createElement('span');
                    info.textContent = `${student.name} · ${student.emotion}${duration}${severity}`;

                    const actions = document.createElement('div');
                    actions.className = 'attention-actions';

                    const score = document.createElement('strong');
                    score.textContent = `${student.confusion}%`;

                    const btn = document.createElement('button');
                    btn.textContent = 'Contact';
                    btn.addEventListener('click', () => contactStudent(student.sid, student.name));

                    actions.appendChild(score);
                    actions.appendChild(btn);
                    row.appendChild(info);
                    row.appendChild(actions);
                    attention.appendChild(row);
                });
            }

            pushChartPoint(summary.engagement, summary.confusion);

            const alertBox = document.getElementById('alertBox');
            if ((summary.active_alerts || 0) > 0) {
                alertBox.textContent = 'ALERT: Sustained confusion detected';
                alertBox.style.borderColor = 'rgba(245, 158, 11, 0.8)';
                alertBox.style.background = 'rgba(245, 158, 11, 0.2)';
            } else if (summary.confusion > 50) {
                alertBox.textContent = 'ALERT: Class confusion is high';
                alertBox.style.borderColor = 'rgba(245, 158, 11, 0.8)';
                alertBox.style.background = 'rgba(245, 158, 11, 0.2)';
            } else {
                alertBox.textContent = 'ALERT: NORMAL';
                alertBox.style.borderColor = 'rgba(59, 130, 246, 0.45)';
                alertBox.style.background = 'rgba(59, 130, 246, 0.2)';
            }
        });

        document.getElementById('tMic').addEventListener('click', () => {
            if (!myStream || !myStream.getAudioTracks().length) return;
            tMicOn = !tMicOn;
            myStream.getAudioTracks()[0].enabled = tMicOn;
            const btn = document.getElementById('tMic');
            btn.classList.toggle('off', !tMicOn);
            btn.innerHTML = tMicOn ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
        });

        document.getElementById('tCam').addEventListener('click', () => {
            if (!myStream || !myStream.getVideoTracks().length) return;
            tCamOn = !tCamOn;
            myStream.getVideoTracks()[0].enabled = tCamOn;
            const btn = document.getElementById('tCam');
            btn.classList.toggle('off', !tCamOn);
            btn.innerHTML = tCamOn ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
        });

        window.onload = init;
    </script>
</body>

</html>

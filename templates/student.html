<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduSense | Student Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
            --ok: #22c55e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .main-broadcast {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #teacherVid {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview-pip {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 220px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            border: 2px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #myVid {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .session-info {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid var(--glass);
        }

        .emotion-badge {
            margin-top: 8px;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 999px;
            width: max-content;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .controls {
            height: 75px;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid var(--glass);
            flex-shrink: 0;
        }

        .btn-ctrl {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: white;
            background: var(--glass);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-ctrl.off {
            background: var(--danger);
        }

        .btn-exit {
            background: var(--danger);
            padding: 0 25px;
            border-radius: 10px;
            height: 45px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div class="main-broadcast">
        <div class="session-info">
            🔴 Live: <strong>{{ session.get('student_name') }}'s Class</strong>
            <div class="emotion-badge" id="emotionBadge">Emotion: detecting...</div>
        </div>

        <video id="teacherVid" autoplay playsinline
            poster="https://via.placeholder.com/800x450/000/fff?text=Waiting+for+Teacher..."></video>

        <div class="preview-pip">
            <video id="myVid" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button class="btn-ctrl" id="sMic" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
        <button class="btn-ctrl" id="sCam" onclick="toggleCam()"><i class="fas fa-video"></i></button>
        <div style="width: 30px;"></div>
        <button class="btn-exit" onclick="exitRoom()"><i class="fas fa-phone-slash"></i> Exit Classroom</button>
    </div>

    <script>
        const socket = io();
        let myStream;
        let p;
        let micOn = true, camOn = true;
        let lastFaceSignal = 62;
        let lastEmotion = 'neutral';
        let publishTimer;

        function computeEmotionAndMetrics() {
            let emotion = 'neutral';
            let engagement = 68;
            let confusion = 24;

            if (!camOn && !micOn) {
                emotion = 'distracted';
                engagement = 20;
                confusion = 65;
            } else if (!camOn) {
                emotion = 'distracted';
                engagement = 35;
                confusion = 55;
            } else if (!micOn) {
                emotion = 'neutral';
                engagement = 55;
                confusion = 35;
            }

            const delta = Math.floor(Math.random() * 21) - 10;
            const faceSignal = Math.max(0, Math.min(100, lastFaceSignal + delta));
            const faceDrop = lastFaceSignal - faceSignal;
            lastFaceSignal = faceSignal;

            const jitter = Math.floor(Math.random() * 10) - 5;
            engagement = Math.max(0, Math.min(100, engagement + Math.floor((faceSignal - 50) / 2) + jitter));
            confusion = Math.max(0, Math.min(100, confusion + Math.floor((50 - faceSignal) / 2) - jitter));

            if (faceDrop >= 12) {
                confusion = Math.min(100, confusion + 16);
            }

            if (confusion >= 55) emotion = 'confused';
            if (engagement >= 75 && confusion <= 35) emotion = 'engaged';

            if (lastEmotion !== 'confused' && emotion === 'confused') {
                confusion = Math.min(100, confusion + 12);
            }

            lastEmotion = emotion;

            return { emotion, engagement, confusion };
        }

        function publishMetrics() {
            const metrics = computeEmotionAndMetrics();
            socket.emit('update_metrics', metrics);

            const badge = document.getElementById('emotionBadge');
            badge.innerText = `Emotion: ${metrics.emotion} | Engagement ${metrics.engagement}% | Confusion ${metrics.confusion}%`;
            if (metrics.emotion === 'engaged') {
                badge.style.borderColor = 'rgba(34, 197, 94, 0.7)';
                badge.style.background = 'rgba(34, 197, 94, 0.2)';
            } else if (metrics.emotion === 'confused') {
                badge.style.borderColor = 'rgba(239, 68, 68, 0.7)';
                badge.style.background = 'rgba(239, 68, 68, 0.2)';
            } else {
                badge.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                badge.style.background = 'rgba(59, 130, 246, 0.2)';
            }
        }
